<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>eCare 模擬入口</title>
  <link rel="stylesheet" href="/fontawesome.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="overlay">
    <div class="page">
      <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
          <img src="https://ecare.nfu.edu.tw/images/NFU-LOGO.jpg" style="height: 40px;" />
          <h1>校務行政e化資訊平台 - eCare</h1>
        </div>
        <div class="links">
          <a href="/login.html">登入</a>
          <a href="/register.html">註冊</a>
          <a href="#">忘記密碼</a>
        </div>
      </div>
      <div class="main-grid">
        <div class="login-box">
          <h2>系統入口</h2>
          <div class="field"><label>說明</label><p>請使用上方連結前往登入或註冊頁面。</p></div>
          <div class="link-row"><a href="/login.html">登入頁</a><a href="/register.html">註冊頁</a></div>
        </div>
        <div class="portal-box">
          <h2>常用系統快速連結 Quick Links</h2>
          <div class="portal-list">
            <a class="portal-item" data-icon="1" href="#"><div class="portal-icon"><i class="fas fa-pen fa-2x"></i></div><div class="portal-title">數位學習平台 uLearn</div><div class="portal-desc">提供數位教科課程互動功能</div></a>
            <a class="portal-item" data-icon="2" href="#"><div class="portal-icon"><i class="fas fa-calendar fa-2x"></i></div><div class="portal-title">工讀生暨助理生考平台</div><div class="portal-desc">週數及連線工讀時數</div></a>
            <a class="portal-item" data-icon="3" href="#"><div class="portal-icon"><i class="fas fa-clipboard-list fa-2x"></i></div><div class="portal-title">教務查詢整合平台</div><div class="portal-desc">成績、課程及排課報查詢</div></a>
            <a class="portal-item" data-icon="4" href="#"><div class="portal-icon"><i class="fas fa-file fa-2x"></i></div><div class="portal-title">學生證明文件線上申請系統</div><div class="portal-desc">在學證明文件申請</div></a>
            <a class="portal-item" data-icon="5" href="#"><div class="portal-icon"><i class="fas fa-check-circle fa-2x"></i></div><div class="portal-title">iAct活動報名系統</div><div class="portal-desc">查詢與報名各項活動</div></a>
            <a class="portal-item" data-icon="6" href="#"><div class="portal-icon"><i class="fas fa-cog fa-2x"></i></div><div class="portal-title">電子化表單上簽核系統</div><div class="portal-desc">展簽核、工單簽簽簽簽</div></a>
          </div>
        </div>
      </div>
      <div class="footer">© 2025 校務行政e化資訊平台 - eCare - 國立虎尾科技大學</div>
    </div>
  </div>
</body>
</html>
